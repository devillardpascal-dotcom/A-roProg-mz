<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AeroProg Logo</title>
<style>
  body { background:#0d1117; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; margin:0; gap:20px; }
  p { color:#8b949e; font-family:Arial,sans-serif; font-size:13px; text-align:center; }
</style>
</head>
<body>
  <svg id="logo" width="180" height="180" viewBox="0 0 680 220" xmlns="http://www.w3.org/2000/svg">
    <circle cx="340" cy="110" r="89" fill="#0a0a1a"/>
    <circle cx="340" cy="110" r="95" fill="none" stroke="#002395" stroke-width="8"/>
    <circle cx="340" cy="110" r="78" fill="none" stroke="#f0f0f0" stroke-width="6"/>
    <circle cx="340" cy="110" r="61" fill="none" stroke="#e8112d" stroke-width="8"/>
    <g transform="translate(342, 105)">
      <text x="-18" y="0"
        text-anchor="middle" dominant-baseline="central"
        font-family="Arial Black, Impact, sans-serif"
        font-weight="900" font-size="72"
        fill="#002395"
        stroke="#f0f0f0" stroke-width="2" stroke-linejoin="round" paint-order="stroke">A</text>
      <text x="18" y="0"
        text-anchor="middle" dominant-baseline="central"
        font-family="Arial Black, Impact, sans-serif"
        font-weight="900" font-size="72"
        fill="#e8112d"
        stroke="#f0f0f0" stroke-width="2" stroke-linejoin="round" paint-order="stroke">P</text>
    </g>
  </svg>

  <p>Clic droit sur le logo → "Enregistrer l'image sous..." → nommez-le <strong style="color:#f0c050;">apple-touch-icon.png</strong></p>

  <canvas id="canvas" width="180" height="180" style="display:none;"></canvas>
  <a id="dl" style="color:#3fb950;font-family:Arial,sans-serif;font-size:14px;cursor:pointer;" onclick="download()">⬇ Télécharger apple-touch-icon.png</a>

  <script>
    function download() {
      const svg = document.getElementById('logo');
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      const data = new XMLSerializer().serializeToString(svg);
      const blob = new Blob([data], {type:'image/svg+xml'});
      const url = URL.createObjectURL(blob);
      const img = new Image();
      img.onload = function() {
        ctx.drawImage(img, 0, 0, 180, 180);
        const a = document.createElement('a');
        a.download = 'apple-touch-icon.png';
        a.href = canvas.toDataURL('image/png');
        a.click();
        URL.revokeObjectURL(url);
      };
      img.src = url;
    }
  </script>
</body>
</html>
